server:
  port: 8012
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

spring:
  application:
    name: SAA-12RAG4AiOps
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: deepseek-r1
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        initialize-schema: true
        index-name: springAi-index
        prefix: springAi-prefix
  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password:

# 日志配置 - 用于查看Prompt内容
logging:
  level:
    # Spring AI 相关日志
    org.springframework.ai: DEBUG
    # DashScope API 调用日志
    com.alibaba.cloud.ai.dashscope: DEBUG